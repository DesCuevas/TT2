<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    
    <!-- <script src="head-loader.js"></script> -->
    <link rel="stylesheet" href="css/login.css">
  
</head>
<body>

    <header class="login-header-bar">
        <div class="login-brand">
            <img src="img/logo-png.png" alt="Deep Bug Logo" class="brand-logo">
            <span class="brand-text">Deep Bug</span>
        </div>
        <a href="registro.html" class="login-btn-header-register">Registrate</a>
    </header>

    <main class="login-main-container">
        <div class="login-form-wrapper">
            
            <h1 class="login-title">Iniciar Sesión</h1>

            <form>
                <div class="login-input-group text-start">
                    <label class="login-label">Correo:</label>
                    <input type="email" class="login-input" placeholder="correo.electronico@gmail.com">
                </div>

                <div class="login-input-group text-start position-relative">
                    <label class="login-label">Contraseña:</label>
                    <input type="password" class="login-input" placeholder=". . . . . . . ."> <!-- Simulación de puntos -->
                    <!-- <i class="fas fa-eye-slash login-password-toggle"></i> -->
                </div>

                <div class="login-checkbox-wrapper">
                    <input type="checkbox" id="rememberMe" class="login-checkbox">
                    <!-- Hacer que este check si guarde la contraseña o quitarlo -->
                    <label for="rememberMe" class="login-checkbox-label">Recordar Contraseña</label>
                </div>
<!-- cambiar posteriormente a inicio de colaborador || YA NO-->
                <a type="button" href="inicio.html" class="btn login-btn-primary">Iniciar Sesión</a>


                <p class="login-footer-text">
                    ¿No te has registrado? <a href="registro.html" class="login-link-register">Registrate</a>
                </p>
                <!-- agregar funcionalidad real de olvidar contraseña -->
                <a href="#" class="login-link-forgot">¿Olvidaste tu contraseña?</a>

            </form>
        </div>
    </main>

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->

</body>
</html>
